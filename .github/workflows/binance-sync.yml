name: Binance Sync

on:
  schedule:
    - cron: '0 * * * *'  # setiap jam
  workflow_dispatch:       # bisa trigger manual juga

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Binance Futures to Google Sheets
        run: |
          node << 'EOF'
          const https = require('https');
          const crypto = require('crypto');

          const API_KEY    = process.env.BINANCE_API_KEY;
          const API_SECRET = process.env.BINANCE_API_SECRET;
          const SHEETS_URL = process.env.APPS_SCRIPT_URL;
          const BASE       = 'fapi.binance.com';

          function sign(query) {
            return crypto.createHmac('sha256', API_SECRET).update(query).digest('hex');
          }

          function request(path) {
            return new Promise((resolve, reject) => {
              const req = https.request(
                { hostname: BASE, path, method: 'GET', headers: { 'X-MBX-APIKEY': API_KEY } },
                res => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(JSON.parse(data)));
                }
              );
              req.on('error', reject);
              req.end();
            });
          }

          function post(url, body) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify(body);
              const u    = new URL(url);
              const req  = https.request(
                { hostname: u.hostname, path: u.pathname + u.search, method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } },
                res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => resolve(JSON.parse(d)));
                }
              );
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }

          function formatPair(symbol) {
            const stables = ['USDT','BUSD','USDC'];
            for (const s of stables) {
              if (symbol.endsWith(s) && symbol !== s)
                return symbol.slice(0, -s.length) + '/' + s;
            }
            return symbol;
          }

          async function main() {
            const timestamp = Date.now();
            const startTime = timestamp - (90 * 24 * 60 * 60 * 1000);
            const query     = `incomeType=REALIZED_PNL&startTime=${startTime}&limit=1000&timestamp=${timestamp}`;
            const sig       = sign(query);
            const path      = `/fapi/v1/income?${query}&signature=${sig}`;

            console.log('Fetching from Binance...');
            const data = await request(path);

            if (!Array.isArray(data)) {
              console.error('Binance error:', JSON.stringify(data));
              process.exit(1);
            }

            console.log(`Got ${data.length} records from Binance`);

            const trades = data
              .filter(r => parseFloat(r.income) !== 0)
              .map(r => {
                const pnl  = parseFloat(parseFloat(r.income).toFixed(4));
                const date = new Date(r.time).toISOString().split('T')[0];
                return {
                  id:   String(r.tradeId || r.tranId),
                  date,
                  pair: formatPair(r.symbol),
                  side: pnl >= 0 ? 'Long' : 'Short',
                  pnl,
                  notes: ''
                };
              });

            console.log(`Pushing ${trades.length} trades to Sheets...`);
            const result = await post(SHEETS_URL, { action: 'sync_bulk', trades });
            console.log('Sheets response:', JSON.stringify(result));
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          APPS_SCRIPT_URL:    ${{ secrets.APPS_SCRIPT_URL }}
