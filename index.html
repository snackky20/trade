<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB: EVENT 6000 DIAMOND GRATIS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .ml-container {
            width: 90%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #fbbf24;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            position: relative;
        }

        .header-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; color: #fbbf24; text-transform: uppercase; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #cbd5e1; }

        .form-group {
            text-align: left;
            margin: 15px 0;
        }

        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
        }

        .flex-input {
            display: flex;
            gap: 10px;
        }

        .btn-claim {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            box-shadow: 0 4px 0 #b45309;
        }

        .btn-claim:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45309;
        }

        /* Tampilan Troll */
        #troll-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #troll-image {
            width: 85%;
            max-width: 400px;
            border: 5px solid #fbbf24;
            border-radius: 10px;
            animation: shake 0.1s infinite;
        }

        .oalah-text {
            color: #fbbf24;
            font-size: 2rem;
            font-weight: 900;
            margin-top: 20px;
            text-shadow: 2px 2px #f43f5e;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        #loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #fbbf24;
            width: 40px; height: 40px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="ml-container">
        <img src="https://img.okezone.com/content/2021/08/17/326/2456721/mobile-legends-bang-bang-rayakan-ulang-tahun-ke-5-hadirkan-banyak-kejutan-G6V1m198fA.jpg" class="header-img" alt="MLBB Event">
        
        <h1>6,000 DIAMOND GRATIS!</h1>
        <p>Event HUT MLBB: Masukkan User ID anda untuk menerima hadiah diamond instan ke akun anda.</p>

        <div class="form-group">
            <label>USER ID & SERVER</label>
            <div class="flex-input">
                <input type="number" id="userid" placeholder="ID User (12345678)">
                <input type="number" id="serverid" style="width: 80px;" placeholder="(2001)">
            </div>
        </div>

        <button class="btn-claim" onclick="startHack()">KLAIM SEKARANG</button>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text" style="margin-top: 15px; font-weight: bold;">Menghubungkan ke server Moonton...</p>
        </div>
    </div>

    <div id="troll-screen">
        <img src="https://i.ibb.co/B2CL2mRc/3.jpg" id="troll-image" alt="OALAH">
        <div class="oalah-text">OALAH... NGIMPI!! 😂</div>
        <p style="color: white; margin-top: 10px;">Mana ada diamond gratis tong, kerja/belajar yang bener!</p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer;">Coba Lagi (Gak bakal bisa)</button>
    </div>

    <script>
        function startHack() {
            const id = document.getElementById('userid').value;
            const server = document.getElementById('serverid').value;

            if (id === "" || server === "") {
                alert("Isi ID & Server dulu, nanti diamondnya nyasar ke akun bapakmu!");
                return;
            }

            const loading = document.getElementById('loading-overlay');
            const lText = document.getElementById('loading-text');
            loading.style.display = 'flex';

            // Tahap-tahap loading biar dia deg-degan
            setTimeout(() => { lText.innerText = "Mencari ID: " + id + " (" + server + ")..."; }, 1500);
            setTimeout(() => { lText.innerText = "ID Ditemukan! Menginjeksi 6,000 Diamond..."; }, 3000);
            setTimeout(() => { lText.innerText = "Hampir selesai... Verifikasi Keamanan..."; }, 4500);
            
            // Eksekusi Troll
            setTimeout(() => {
                document.getElementById('troll-screen').style.display = 'flex';
                // Audio ketawa khas meme Indo
                let audio = new Audio('https://www.myinstants.com/media/sounds/suara-ketawa-meme.mp3');
                audio.play();
            }, 6000);
        }
    </script>
</body>
</html>
