<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kado Spesial Buat Kamu</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe4e1;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            cursor: pointer;
            text-align: center;
        }

        /* Teks instruksi */
        .instruction {
            margin-bottom: 20px;
            color: #d81b60;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        /* Kotak Hadiah */
        .gift-box {
            position: relative;
            width: 150px;
            height: 150px;
            background-color: #ff4d4d;
            margin: 0 auto;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Pita Horizontal */
        .gift-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 20px;
            background-color: #ffcc00;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 2;
        }

        /* Pita Vertikal */
        .gift-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background-color: #ffcc00;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* Tutup Kotak */
        .lid {
            position: absolute;
            width: 170px;
            height: 40px;
            background-color: #ff3333;
            top: -40px;
            left: -10px;
            z-index: 3;
            border-radius: 5px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Pita di atas tutup */
        .lid::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background-color: #ffcc00;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Foto yang disembunyikan */
        .photo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 250px;
            z-index: -1;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }

        .photo-container img {
            width: 100%;
            border-radius: 10px;
            border: 8px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Efek Terbuka */
        .container.open .lid {
            transform: translateY(-100px) rotate(-15deg);
            opacity: 0;
        }

        .container.open .gift-box {
            transform: translateY(100px);
            opacity: 0;
        }

        .container.open .photo-container {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            z-index: 10;
        }

        .container.open .instruction {
            opacity: 0;
        }

        /* Animasi Goyang Sebelum Dibuka */
        .gift-box:hover {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0); }
            25% { transform: rotate(3deg); }
            50% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
            100% { transform: rotate(0); }
        }
    </style>
</head>
<body>

    <div class="container" onclick="openGift()">
        <div class="instruction">Klik untuk buka hadiah! ✨</div>
        
        <div class="lid"></div>
        <div class="gift-box"></div>

        <div class="photo-container">
            <img src="https://i.ibb.co/B2CL2mRc/3.jpg" alt="Oalah Meme">
            <h2 style="color: #d81b60; margin-top: 15px;">OALAH... 😂</h2>
        </div>
    </div>

    <script>
        function openGift() {
            document.querySelector('.container').classList.add('open');
        }
    </script>

</body>
</html>
